<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>資工選課表</title>
    <style>
    table {
      font-family: Arial, Helvetica, sans-serif;
      border-collapse: collapse;
      width: 100%;
    }
    
    td, th {
      border: 1px solid #ddd;
      padding: 6px;
      font-weight: bold;
    }
    
    tr:nth-child(even){background-color: #f2f2f2;}
    
    tr:hover {background-color: #ddd;}
    
    th {
      padding-top: 12px;
      padding-bottom: 12px;
      text-align: left;
      background-color: #04AA6D;
      color: white;
    }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table id="csie">
        <tr>
            <th>開課單位</th>
            <th>課程名稱</th>
            <th>授課教師</th>
        </tr>
        <tr>
            <td>資工系</td>
            <td><a href="https://catalog.cgu.edu.tw/coursedata?sectionid=A2337">物件導向軟體設計</a></td>
            <td>黃崇源</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><a href="https://catalog.cgu.edu.tw/coursedata?sectionid=61602">計算機網路實驗</a></td>
            <td>李春良</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><a href="https://catalog.cgu.edu.tw/coursedata?sectionid=A2338">作業系統實務</a></td>
            <td>張哲維</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><a href="https://catalog.cgu.edu.tw/coursedata?sectionid=71796">生物統計</a></td>

        <tr>
            <td>資工系</td>

            <td>陳仁暉</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><a href="https://catalog.cgu.edu.tw/coursedata?sectionid=56665">軟硬體專題(2)</a></td>

        </tr>
    </table>
    
    <br><br>

    <button onclick="changeResult()">Change</button>

    <script>
        function changeResult() {
            var myTable = document.getElementById("csie");
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }
    </script>

</body>
</html>
